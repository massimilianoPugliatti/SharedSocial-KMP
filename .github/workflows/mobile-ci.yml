name: Mobile CI

on:
  push:
    branches: [ master, "feature/*", "tech/*" ]
  pull_request:
    branches: [ master ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant permission
        run: chmod +x gradlew

      - name: Run Common Tests
        run: ./gradlew :composeApp:testDebugUnitTest

  android-build:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant permission
        run: chmod +x gradlew

      - name: Create Google Services JSON
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > composeApp/google-services.json

      - name: Build Android APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk

  ios-build:
    needs: unit-tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Google Services Plist
        run: echo '${{ secrets.GOOGLE_SERVICES_PLIST }}' > iosApp/iosApp/GoogleService-Info.plist

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build Shared Framework (Kotlin)
        run: ./gradlew :composeApp:assembleDebug

      - name: Build iOS App via Xcode CLI
        working-directory: iosApp
        run: |
          # Usiamo 'iPhone 17' che è disponibile nel tuo log
          # Definiamo -derivedDataPath per sapere esattamente dove finisce l'app
          xcodebuild -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -derivedDataPath build_output \
            build | xcpretty

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: iosApp/build_output/Build/Products/Debug-iphonesimulator/*.app